<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ishchi Qidiruv</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --border: #2a2f3d;
      --accent: #00e5a0;
      --accent2: #0075ff;
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #ff4d6a;
      --success: #00e5a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 160, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 160, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .tag {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(0, 229, 160, 0.08);
      border: 1px solid rgba(0, 229, 160, 0.2);
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Search card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-wrapper::before {
      content: '#';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      font-size: 16px;
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 14px 14px 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.1);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
      font-size: 14px;
    }

    button {
      padding: 14px 22px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status */
    .status {
      font-size: 12px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
    }

    .dot.loaded { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.error-dot { background: var(--error); }

    /* Result */
    #result {
      margin-top: 20px;
      animation: fadeUp 0.3s ease both;
    }

    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    .result-card.not-found::before {
      background: var(--error);
    }

    .result-id {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .result-id span {
      color: var(--accent);
      font-weight: 600;
    }

    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width: 110px;
      padding-top: 2px;
    }

    .result-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .result-value.highlight {
      color: var(--accent);
      font-size: 16px;
    }

    .not-found-msg {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--error);
      font-size: 14px;
    }

    .not-found-msg .icon {
      font-size: 20px;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Enter key hint */
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="tag">Xodimlar bazasi</div>
      <h1>ID bo'yicha <span>qidiruv</span></h1>
      <p class="subtitle">ID raqam kiriting — ma'sul shaxs va ishchi ma'lumoti chiqadi</p>
    </div>

    <div class="card">
      <div class="input-group">
        <div class="input-wrapper">
          <input type="text" id="idInput" placeholder="ID raqam..." autocomplete="off" />
        </div>
        <button id="searchBtn" onclick="search()" disabled>Qidirish</button>
      </div>
      <div class="hint">Enter tugmasini bosib ham qidirsa bo'ladi</div>
      <div style="margin-top: 12px;">
        <span class="status">
          <span class="dot loading" id="statusDot"></span>
          <span id="statusText">Ma'lumotlar yuklanmoqda...</span>
        </span>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwFZCr2IyPhUjNDLXWZbDWVNfQ0XrGBrsntvKSd_nDN9Ijte5aD9DtAb8S4Cn8yJxlzRA/exec";

    function search() {
      const id = document.getElementById('idInput').value.trim();
      const resultDiv = document.getElementById('result');
      const btn = document.getElementById('searchBtn');

      if (!id) return;

      btn.disabled = true;
      btn.textContent = '...';
      resultDiv.innerHTML = '';

      const old = document.getElementById('jsonp-script');
      if (old) old.remove();

      window.handleResult = function(data) {
        if (data.error) {
          resultDiv.innerHTML = `
            <div class="result-card not-found">
              <div class="not-found-msg">
                <span class="icon">✕</span>
                <span><b>${id}</b> — bu ID topilmadi</span>
              </div>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result-card">
              <div class="result-id">ID: <span>${id}</span></div>
              <div class="result-row">
                <span class="result-label">Ism (Kirill)</span>
                <span class="result-value">${data.kirill || '—'}</span>
              </div>
              <div class="result-row">
                <span class="result-label">Ism (Lotin)</span>
                <span class="result-value">${data.lotin || '—'}</span>
              </div>
              <div class="result-row">
                <span class="result-label">Brigada</span>
                <span class="result-value">${data.brigada || '—'}</span>
              </div>
              <div class="result-row">
                <span class="result-label">Ma'sul shaxs</span>
                <span class="result-value highlight">${data.masul || '—'}</span>
              </div>
            </div>
          `;
        }
        btn.disabled = false;
        btn.textContent = 'Qidirish';
      };

      const script = document.createElement('script');
      script.id = 'jsonp-script';
      script.src = API_URL + '?id=' + encodeURIComponent(id) + '&callback=handleResult';
      script.onerror = function() {
        resultDiv.innerHTML = `<div class="result-card not-found"><div class="not-found-msg"><span class="icon">✕</span><span>Xatolik yuz berdi</span></div></div>`;
        btn.disabled = false;
        btn.textContent = 'Qidirish';
      };
      document.body.appendChild(script);
    }

    document.getElementById('statusDot').className = 'dot loaded';
    document.getElementById('statusText').textContent = 'Tayyor';
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('idInput').focus();

    document.getElementById('idInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
